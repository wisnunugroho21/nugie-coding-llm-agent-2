# Stage-1 (general pretraining) corpus — H200 scale.
# the-stack-dedup has the same `data/<lang>` layout and `content` field as
# the-stack-smol, so only the source + scale change here. It is a GATED dataset:
# accept the terms on huggingface.co and run `huggingface-cli login` (or set
# HF_TOKEN) before `prepare`. Ungated alternative: path: codeparrot/github-code-clean
# (drop `data_dir`, keep text_key: content).

out_dir: data/pretrain
tokenizer: tokenizers/code_bpe.json

hf:
  path: bigcode/the-stack-dedup
  data_dir: data/python        # shards by language under data/<lang>
  split: train
  streaming: true              # stream — the full shard is far too big to download
  text_key: content
  max_documents: 2000000       # ~2M docs feeds a ~20B-token run; raise/remove for more

filter:
  enabled: true

dedup:
  exact: true
  minhash: true
  minhash_threshold: 0.8
  minhash_num_perm: 64
  minhash_ngram: 5

fim:
  enabled: true
  rate: 0.5
  spm_rate: 0.5

val_fraction: 0.005
append_eot: true
seed: 0
