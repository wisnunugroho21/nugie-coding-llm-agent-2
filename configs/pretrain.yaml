# Stage-1: general pretraining on the filtered code corpus.
# Sized for a single NVIDIA H200 (141 GB). For the small T4 model, point
# `model_config` back at configs/model_t4.yaml and shrink batch_size/seq_len.
model_config: configs/model_h200.yaml

data:
  bin_dir: data/pretrain     # produced by: python -m training.data.prepare --config configs/data_pretrain.yaml
  seq_len: 4096              # multiple of gdn_chunk_size (64) and <= max_seq_len (4096)

train:
  phase: pretrain
  out_dir: checkpoints/pretrain
  seed: 0

  batch_size: 16             # micro-batch; raise until you approach the HBM limit
  grad_accum: 8              # effective batch = 16 * 4096 * 8 ≈ 524k tokens/opt-step
  max_steps: 38000           # ≈ 20B tokens at 524k tokens/step (see token budget)

  lr: 6.0e-4
  min_lr: 6.0e-5
  warmup_steps: 2000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0

  router_bias_lr: 1.0e-3

  log_every: 50
  eval_every: 1000
  eval_batches: 100
  ckpt_every: 2000
