# Stage-1: general pretraining on the filtered code corpus.
model_config: configs/model_t4.yaml

data:
  bin_dir: data/pretrain     # produced by: python -m training.data.prepare --config configs/data_pretrain.yaml
  seq_len: 512               # multiple of gdn_chunk_size (64) and <= max_seq_len

train:
  phase: pretrain
  out_dir: checkpoints/pretrain
  seed: 0

  batch_size: 8              # micro-batch; T4-friendly at seq_len 512
  grad_accum: 4              # effective batch = 8 * 4 = 32 sequences (16k tokens/step)
  max_steps: 20000

  lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 500
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0

  router_bias_lr: 1.0e-3

  log_every: 20
  eval_every: 500
  eval_batches: 50
  ckpt_every: 1000
